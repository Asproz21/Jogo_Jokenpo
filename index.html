<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jokenpo Steampunk</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(#2b1d13,#1a120d);
  color:#f5e6c8;
}

#app{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.screen{display:none;flex-direction:column;align-items:center;gap:1rem}
.screen.active{display:flex}

.game-title{
  font-size:26px;
  color:#d4a373;
}

.arena{
  width:350px;
  height:180px;
  border-radius:12px;
  background:#1b120c;
  border:2px solid #8c6239;
  position:relative;
}

.gear{
  position:absolute;
  font-size:30px;
  opacity:.2;
  animation:spin 10s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

.g1{top:10px;left:10px}
.g2{bottom:10px;right:10px}

.player{
  position:absolute;
  bottom:20px;
  text-align:center;
}

.p1{left:40px}
.p2{right:40px}

.sprite{font-size:32px}

button{
  background:#8c6239;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  color:white;
}

button:hover{background:#b08968}

.choices{
  display:flex;
  gap:10px;
}

.choice{
  background:#3a2a1c;
  padding:10px;
  border-radius:10px;
  font-size:20px;
  cursor:pointer;
}

.choice.selected{
  border:2px solid gold;
}

.winner{animation:bounce .6s infinite}
@keyframes bounce{
  50%{transform:translateY(-10px)}
}

.loser{opacity:.4}

input{
  padding:8px;
  border-radius:6px;
  border:none;
}
</style>
</head>

<body>

<div id="app">

<!-- SETUP -->
<div id="setup" class="screen active">
  <div class="game-title">⚙️ Jokenpo Steampunk ⚙️</div>

  <input id="n1" placeholder="Jogador 1">

  <div>
    <button onclick="modeCPU()">Vs CPU 🤖</button>
    <button onclick="modePVP()">2 Jogadores 👥</button>
  </div>

  <input id="n2" placeholder="Jogador 2 (se PVP)">
  
  <button onclick="start()">Iniciar</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

<div class="arena">
  <div class="gear g1">⚙️</div>
  <div class="gear g2">⚙️</div>

  <div class="player p1">
    <div id="s1" class="sprite">❔</div>
    <div id="name1"></div>
  </div>

  <div class="player p2">
    <div id="s2" class="sprite">❔</div>
    <div id="name2"></div>
  </div>
</div>

<div class="choices" id="choices"></div>

<button onclick="confirm()">Confirmar</button>

<div id="msg"></div>
<div id="score"></div>

</div>

</div>

<audio id="win" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>

<script>
const OPT=[
 {id:"pedra",icon:"🪨"},
 {id:"papel",icon:"📄"},
 {id:"tesoura",icon:"✂️"}
];

let mode="cpu";
let turn=1;
let c1=null,c2=null;
let s1=0,s2=0;
let n1="",n2="CPU";

function modeCPU(){
 mode="cpu";
 document.getElementById("n2").style.display="none";
}

function modePVP(){
 mode="pvp";
 document.getElementById("n2").style.display="block";
}

function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function start(){
 n1=document.getElementById("n1").value;
 if(!n1){alert("Digite nome");return;}

 if(mode==="pvp"){
  n2=document.getElementById("n2").value;
  if(!n2){alert("Digite nome 2");return;}
 }else{
  n2="CPU 🤖";
 }

 document.getElementById("name1").innerText=n1;
 document.getElementById("name2").innerText=n2;

 build();
 show("game");
}

function build(){
 const div=document.getElementById("choices");
 div.innerHTML="";

 OPT.forEach(o=>{
  let b=document.createElement("div");
  b.className="choice";
  b.innerText=o.icon;

  b.onclick=()=>{
    document.querySelectorAll(".choice").forEach(x=>x.classList.remove("selected"));
    b.classList.add("selected");

    if(turn==1)c1=o.id;
    else c2=o.id;
  };

  div.appendChild(b);
 });
}

function confirm(){
 if(!c1)return;

 if(mode==="cpu"){
  c2=OPT[Math.floor(Math.random()*3)].id;
  result();
  return;
 }

 if(turn==1){
  turn=2;
  document.getElementById("msg").innerText=n2+" joga agora";
 }else{
  result();
 }
}

function result(){
 let r=det(c1,c2);

 let el1=document.getElementById("s1");
 let el2=document.getElementById("s2");

 el1.innerText=OPT.find(o=>o.id==c1).icon;
 el2.innerText=OPT.find(o=>o.id==c2).icon;

 el1.classList.remove("winner","loser");
 el2.classList.remove("winner","loser");

 if(r=="p1"){
  s1++;
  el1.classList.add("winner");
  el2.classList.add("loser");
  document.getElementById("win").play();
 }
 else if(r=="p2"){
  s2++;
  el2.classList.add("winner");
  el1.classList.add("loser");
  document.getElementById("win").play();
 }

 document.getElementById("score").innerText=
 `${n1}: ${s1} vs ${n2}: ${s2}`;

 turn=1;
 c1=null;c2=null;
}

function det(a,b){
 if(a==b)return "empate";

 if(
  (a=="pedra"&&b=="tesoura")||
  (a=="tesoura"&&b=="papel")||
  (a=="papel"&&b=="pedra")
 )return "p1";

 return "p2";
}
</script>

</body>
</html>
